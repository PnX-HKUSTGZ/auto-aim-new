enemy_color: "red"
# enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: GPU
min_confidence: 0.8
use_traditional: false

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: -1.3 # degree -2.5   改小偏右
pitch_offset: -0.7 # degree 2    改小偏下
air_resistance: 0.038 # air drag coefficient
comming_angle: 55 # degree
leaving_angle: 20 # degree
decision_speed: 7 # rad/s
high_speed_delay_time: 0.0 # s
low_speed_delay_time: 0.0 # s planner use this value

#####-----shooter参数-----#####
first_tolerance: 3 # 近距离射击容差，degree
second_tolerance: 2 # 远距离射击容差，degree
judge_distance: 2 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

camera_name: "hikrobot"
exposure_ms: 2.5
gain: 16.9
vid_pid: "2bdf:0001"

#  0  0  1
#  -1  0  0
#  0  -1  0
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1] ##云台坐标系到IMU坐标系的旋转矩阵

# 重投影误差: 0.0877px
camera_matrix: [2334.7739420322241, 0, 725.37873086026468, 0, 2330.777116110125, 572.39934640115098, 0, 0, 1] ##相机内参矩阵
distort_coeffs: [-0.090952758920105209, 0.41651785949584574, -0.00037695287949318233, -0.0010674450597477521, 0] ##相机畸变参数

# 相机同理想情况的偏角: yaw1.44 pitch-7.28 roll0.96 degree   mine: yaw-2.21 pitch-0.87 roll-0.59 degree
# 标定板到世界坐标系原点的水平距离: 1.13 m
# 标定板同竖直摆放时的偏角: yaw7.61 pitch13.92 roll-0.46 degree
R_camera2gimbal: [0.038698437164202293, -0.014841305193736679, 0.99914071412448946, -0.99919860890842604, -0.010807264825764662, 0.038540147670345665, 0.010225992201959848, -0.99983145513988114, -0.015247635762743794] ##相机坐标系到云台坐标系的旋转矩阵
t_camera2gimbal: [0.10082245525396162, 0.01623367254924455, 0.063979225579786247] ##相机坐标系到云台坐标系的平移向量

#####-----cboard参数-----#####
quaternion_canid: 0x100
bullet_speed_canid: 0x101
send_canid: 0xff
can_interface: "can0"

#####-----gimbal参数-----#####
com_port: "/dev/ttyACM0"
yaw_kp: 0
yaw_kd: 0
pitch_kp: 0
pitch_kd: 0

#####-----planner-----#####
fire_thresh: 0.005
switch_dist_diff_thresh: 0.0 # m

max_yaw_acc: 50
Q_yaw: [2.7e7, 0]
R_yaw: [1]

max_pitch_acc: 100
Q_pitch: [9e6, 0]
R_pitch: [1]

#####-----buff_detector参数-----#####
model: "assets/yolo11_buff_int8.xml"

#####-----buff_aimer参数-----#####
fire_gap_time: 0.700   # s
predict_time: 0.120     # s